openapi: 3.1.0
info:
  title: Users API
  version: 1.0.0
servers:
  - url: https://api.example.com
paths:
  /users:
    get:
      summary: List users
      description: Returns the users available to the current account.
      operationId: listUsers
      tags:
        - Users
      responses:
        "200":
          description: A list of users.
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      type: object
                      required:
                        - id
                        - name
                      properties:
                        id:
                          type: string
                          example: user_123
                        name:
                          type: string
                          example: Ada Lovelace
    post:
      summary: Create a user
      description: Creates a new user.
      operationId: createUser
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: Grace Hopper
      responses:
        "201":
          description: The created user.
